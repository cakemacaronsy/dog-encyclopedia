<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOG — 犬</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lora:ital,wght@0,400;0,700;1,400&family=Space+Mono:ital@0;1&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #000;
    --white: #fff;
    --gray: #888;
    --light: #e8e8e8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--white);
    color: var(--black);
    font-family: 'Lora', 'Noto Serif JP', serif;
    overflow-x: hidden;
    cursor: crosshair;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* ── LANG SWITCHER ── */
  .lang-switch {
    position: fixed;
    top: 52px;
    right: 20px;
    z-index: 200;
    display: flex;
    border: 2px solid var(--black);
    background: var(--white);
  }
  .lang-btn {
    padding: 8px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--gray);
    transition: background 0.2s, color 0.2s;
  }
  .lang-btn.active { background: var(--black); color: var(--white); }
  .lang-btn:hover:not(.active) { background: var(--light); color: var(--black); }
  .lang-sep { width: 2px; background: var(--black); flex-shrink: 0; }

  /* ── TICKER ── */
  .ticker {
    background: var(--black);
    color: var(--white);
    padding: 10px 0;
    overflow: hidden;
    border-bottom: 2px solid var(--black);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .ticker-inner {
    display: flex;
    gap: 60px;
    animation: ticker 35s linear infinite;
    white-space: nowrap;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .ticker-inner span { flex-shrink: 0; }
  .ticker-sep { color: var(--gray); }
  @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-bottom: 3px solid var(--black);
  }
  .hero-left {
    padding: 60px 50px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border-right: 3px solid var(--black);
  }
  .hero-eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gray);
  }
  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(120px, 20vw, 280px);
    line-height: 0.85;
    letter-spacing: -0.02em;
    opacity: 0;
    transform: translateY(40px);
    animation: fadeUp 0.8s ease forwards 0.2s;
  }
  .hero-subtitle {
    font-family: 'Lora', 'Noto Serif JP', serif;
    font-style: italic;
    font-size: clamp(13px, 1.6vw, 19px);
    line-height: 1.7;
    max-width: 380px;
    color: #333;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.8s ease forwards 0.5s;
  }
  .hero-right {
    background: var(--black);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px;
    position: relative;
    overflow: hidden;
  }
  .dog-ascii {
    font-family: 'Space Mono', monospace;
    font-size: clamp(7px, 1.1vw, 13px);
    line-height: 1.2;
    color: var(--white);
    text-align: center;
    white-space: pre;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.8s;
    letter-spacing: 0.05em;
  }
  .hero-counter {
    position: absolute;
    bottom: 40px;
    right: 40px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--gray);
    letter-spacing: 0.15em;
  }

  /* ── STATS ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-bottom: 3px solid var(--black);
  }
  .stat {
    padding: 40px 30px;
    border-right: 2px solid var(--black);
    opacity: 0;
    transform: translateY(20px);
    transition: background 0.2s, color 0.2s;
  }
  .stat:last-child { border-right: none; }
  .stat:hover { background: var(--black); color: var(--white); }
  .stat-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(40px, 5vw, 72px);
    line-height: 1;
    display: block;
  }
  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 8px;
    display: block;
    color: var(--gray);
  }
  .stat:hover .stat-label { color: #aaa; }

  /* ── SECTION HEADER ── */
  .section-header {
    padding: 60px 50px 20px;
    display: flex;
    align-items: baseline;
    gap: 20px;
    border-bottom: 1px solid var(--light);
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 5vw, 64px);
    letter-spacing: 0.05em;
  }
  .section-num {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--gray);
    letter-spacing: 0.2em;
  }

  /* ── BREEDS ── */
  .breeds-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    border-bottom: 3px solid var(--black);
  }
  .breed-card {
    padding: 40px 50px;
    border-right: 2px solid var(--black);
    border-bottom: 2px solid var(--black);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background 0.25s, color 0.25s;
  }
  .breed-card:nth-child(3n) { border-right: none; }
  .breed-card:nth-child(n+4) { border-bottom: none; }
  .breed-card::after {
    content: '→';
    position: absolute;
    top: 40px; right: 40px;
    font-size: 20px;
    opacity: 0;
    transform: translateX(-10px);
    transition: opacity 0.2s, transform 0.2s;
  }
  .breed-card:hover { background: var(--black); color: var(--white); }
  .breed-card:hover::after { opacity: 1; transform: translateX(0); }
  .breed-icon { font-size: 32px; margin-bottom: 16px; display: block; }
  .breed-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(26px, 2.8vw, 42px);
    line-height: 1;
    letter-spacing: 0.03em;
    display: block;
    margin-bottom: 12px;
  }
  .breed-desc {
    font-family: 'Lora', 'Noto Serif JP', serif;
    font-style: italic;
    font-size: 13px;
    line-height: 1.7;
    color: #555;
  }
  .breed-card:hover .breed-desc { color: #bbb; }
  .breed-origin {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gray);
    margin-top: 16px;
    display: block;
  }
  .breed-card:hover .breed-origin { color: #777; }

  /* ── PULLQUOTE ── */
  .pullquote-section {
    background: var(--black);
    color: var(--white);
    padding: 100px 50px;
    text-align: center;
    border-bottom: 3px solid var(--black);
    position: relative;
    overflow: hidden;
  }
  .pullquote-section::before {
    content: '❝';
    position: absolute;
    top: -20px; left: 50%;
    transform: translateX(-50%);
    font-size: 200px;
    color: #111;
    font-family: 'Lora', serif;
    line-height: 1;
    pointer-events: none;
  }
  .pullquote {
    font-family: 'Lora', 'Noto Serif JP', serif;
    font-style: italic;
    font-size: clamp(20px, 3.5vw, 48px);
    line-height: 1.4;
    max-width: 900px;
    margin: 0 auto 30px;
    position: relative;
    z-index: 1;
  }
  .pullquote-attr {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gray);
  }

  /* ── FACTS ── */
  .facts-section { border-bottom: 3px solid var(--black); }
  .facts-grid { display: grid; grid-template-columns: 1fr 1fr; }
  .fact-item {
    padding: 50px;
    border-right: 2px solid var(--black);
    border-bottom: 2px solid var(--black);
    position: relative;
  }
  .fact-item:nth-child(2n) { border-right: none; }
  .fact-item:last-child, .fact-item:nth-last-child(2) { border-bottom: none; }
  .fact-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    line-height: 1;
    color: var(--light);
    position: absolute;
    top: 20px; right: 30px;
    pointer-events: none;
  }
  .fact-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.05em;
    margin-bottom: 12px;
    display: block;
  }
  .fact-text {
    font-family: 'Lora', 'Noto Serif JP', serif;
    font-size: 14px;
    line-height: 1.8;
    color: #444;
    max-width: 420px;
  }

  /* ── PAW DIVIDER ── */
  .paw-divider {
    padding: 40px;
    text-align: center;
    font-size: 24px;
    letter-spacing: 20px;
    border-bottom: 3px solid var(--black);
    background: var(--light);
  }
  .paw-divider span { display: inline-block; animation: pawBounce 1.5s ease-in-out infinite; }
  .paw-divider span:nth-child(2) { animation-delay: 0.15s; }
  .paw-divider span:nth-child(3) { animation-delay: 0.3s; }
  .paw-divider span:nth-child(4) { animation-delay: 0.45s; }
  .paw-divider span:nth-child(5) { animation-delay: 0.6s; }
  @keyframes pawBounce {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-8px); }
  }

  /* ── FOOTER ── */
  footer {
    background: var(--black);
    color: var(--white);
    padding: 60px 50px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    align-items: end;
  }
  .footer-logo { font-family: 'Bebas Neue', sans-serif; font-size: 80px; line-height: 1; letter-spacing: -0.02em; }
  .footer-logo span { color: var(--gray); }
  .footer-text {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--gray);
    line-height: 2;
    letter-spacing: 0.1em;
    text-align: right;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* ── LANG FADE ── */
  .lang-fade { transition: opacity 0.25s ease; }
  .lang-fade.switching { opacity: 0; }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .hero { grid-template-columns: 1fr; }
    .hero-right { min-height: 50vh; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .breeds-grid { grid-template-columns: 1fr; }
    .breed-card { border-right: none !important; border-bottom: 2px solid var(--black) !important; }
    .breed-card:last-child { border-bottom: none !important; }
    .facts-grid { grid-template-columns: 1fr; }
    .fact-item { border-right: none !important; }
    footer { grid-template-columns: 1fr; }
    .footer-text { text-align: left; }
    .lang-switch { top: auto; bottom: 20px; right: 20px; }
  }
</style>
</head>

      { title:"感情の鏡",      text:"犬は霊長類以外で唯一、人間とアイコンタクトを求める動物です。人間の顔を読み取る能力を進化させました——祖先である狼にはない特殊な能力です。" },
    ],
  },
};

let currentLang = 'en';

function buildTicker(lang) {
  const items = CONTENT[lang].ticker;
  return [...items, ...items].map(t =>
    `<span>${t}</span><span class="ticker-sep">///</span>`
  ).join('');
}

function buildBreeds(lang) {
  return CONTENT[lang].breeds.map(b => `
    <div class="breed-card reveal">
      <span class="breed-icon">${b.icon}</span>
      <span class="breed-name">${b.name}</span>
      <p class="breed-desc">${b.desc}</p>
      <span class="breed-origin">${b.origin}</span>
    </div>`).join('');
}

function buildFacts(lang) {
  return CONTENT[lang].facts.map((f, i) => `
    <div class="fact-item reveal">
      <span class="fact-number">0${i+1}</span>
      <span class="fact-title">${f.title}</span>
      <p class="fact-text">${f.text}</p>
    </div>`).join('');
}

function setLang(lang) {
  if (lang === currentLang) return;
  currentLang = lang;

  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.textContent === lang.toUpperCase()));

  const faders = document.querySelectorAll('.lang-fade');
  faders.forEach(el => el.classList.add('switching'));

  setTimeout(() => {
    const c = CONTENT[lang];

    document.querySelectorAll('[data-key]').forEach(el => {
      const v = c[el.dataset.key];
      if (v !== undefined) el.innerHTML = v;
    });

    document.getElementById('tickerInner').innerHTML = buildTicker(lang);
    document.getElementById('breedsGrid').innerHTML  = buildBreeds(lang);
    document.getElementById('factsGrid').innerHTML   = buildFacts(lang);

    document.querySelectorAll('.reveal:not(.visible)').forEach(el => revealObserver.observe(el));
    faders.forEach(el => el.classList.remove('switching'));
    document.documentElement.lang = lang === 'ja' ? 'ja' : 'en';
  }, 250);
}

// Initial render
document.getElementById('tickerInner').innerHTML = buildTicker('en');
document.getElementById('breedsGrid').innerHTML  = buildBreeds('en');
document.getElementById('factsGrid').innerHTML   = buildFacts('en');
const c0 = CONTENT['en'];
document.querySelectorAll('[data-key]').forEach(el => {
  const v = c0[el.dataset.key];
  if (v !== undefined) el.innerHTML = v;
});

// Scroll reveal
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach((entry, i) => {
    if (entry.isIntersecting) {
      setTimeout(() => entry.target.classList.add('visible'), i * 80);
      revealObserver.unobserve(entry.target);
    }
  });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

// Paw trail on click
const pawStyle = document.createElement('style');
pawStyle.textContent = `@keyframes pawFade {
  0%   { opacity:1; transform:scale(1.5) rotate(-20deg); }
  100% { opacity:0; transform:scale(0.5) rotate(20deg) translateY(-20px); }
}`;
document.head.appendChild(pawStyle);

document.addEventListener('click', (e) => {
  if (e.target.closest('.lang-switch')) return;
  const paw = document.createElement('span');
  paw.textContent = '🐾';
  paw.style.cssText = `position:fixed;left:${e.clientX-12}px;top:${e.clientY-12}px;font-size:20px;pointer-events:none;z-index:9998;animation:pawFade 0.8s ease forwards;`;
  document.body.appendChild(paw);
  setTimeout(() => paw.remove(), 800);
});
</script>
</body>
</html>
